steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file
      - docker/web/Dockerfile
      - --tag
      - ${_IMAGE_URI}
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE_URI}

images:
  - ${_IMAGE_URI}
