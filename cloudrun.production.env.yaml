# Template for Cloud Run production env vars.
# Cloud Build renders project-specific values into a temporary YAML before deploy.
# Keep secrets out of this file; Cloud Run service and jobs receive them from Secret Manager.

DJANGO_SETTINGS_MODULE: config.settings.production
DJANGO_ALLOWED_HOSTS: ostrov.quest,www.ostrov.quest
DJANGO_CSRF_TRUSTED_ORIGINS: https://ostrov.quest,https://www.ostrov.quest
DJANGO_TIME_ZONE: UTC
DJANGO_LOG_LEVEL: INFO
DJANGO_SECURE_SSL_REDIRECT: "true"
DJANGO_SESSION_COOKIE_SECURE: "true"
DJANGO_CSRF_COOKIE_SECURE: "true"
DJANGO_SECURE_HSTS_SECONDS: "3600"
DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "false"
DJANGO_SECURE_HSTS_PRELOAD: "false"

GUNICORN_WORKERS: "2"
GUNICORN_THREADS: "4"
GUNICORN_TIMEOUT: "120"
GUNICORN_GRACEFUL_TIMEOUT: "30"
GUNICORN_KEEPALIVE: "5"
GUNICORN_LOG_LEVEL: info

POSTGRES_DB: ostrov_quest
POSTGRES_USER: ostrov_quest
POSTGRES_PORT: "5432"
POSTGRES_CONN_MAX_AGE: "60"
POSTGRES_CONN_HEALTH_CHECKS: "true"
CLOUD_SQL_CONNECTION_NAME: __CLOUD_SQL_CONNECTION_NAME__

GOOGLE_CLOUD_PROJECT: __GOOGLE_CLOUD_PROJECT__
GCS_STATIC_BUCKET_NAME: __GCS_STATIC_BUCKET_NAME__
GCS_MEDIA_BUCKET_NAME: __GCS_MEDIA_BUCKET_NAME__
GCS_STATIC_PREFIX: static
GCS_MEDIA_PREFIX: media
GCS_STATIC_CACHE_CONTROL: public, max-age=31536000, immutable
GCS_MEDIA_CACHE_CONTROL: public, max-age=3600

DJANGO_SUPERUSER_USERNAME: admin
DJANGO_SUPERUSER_EMAIL: admin@ostrov.quest
